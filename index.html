<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <title>Document</title>
</head>
<body class="lightMode">
    <h1>Calculadora</h1>
    <div class="calculadora">
        <label for="text">CALC.JS</label>
        <br>
        <input type="text"name="calc-js" id="calc-js">
        <button class="claro/escuro" id="claro/escuro">Tema claro/escuro</button>
    </div>
    <div class="button-c">
        <br>
        <button class="button-c" id="button-c">c</button>
        <button class="button-parentese1" id="button-parentese1">(</button>
        <button class="button-parentese2" id="button-parentese2">)</button>
        <button class="button-barra1" id="button-barra1">/</button><br>
        <br>
        <button class="button-7" id="button-7">7</button>
        <button class="button-8" id="button-8">8</button>
        <button class="button-9" id="button-9">9</button>
        <button class="button-asterisco1" id="button-aterisco1">*</button>
        <br><br>
        <button class="button-4" id="button-4">4</button>
        <button class="button-5" id="button-5">5</button>
        <button class="button-6" id="button-6">6</button>
        <button class="button--" id="button--">-</button>
        <br><br>
        <button class="button-1" id="button-1">1</button>
        <button class="button-2" id="button-2">2</button>
        <button class="button-3" id="button-3">3</button>
        <button class="button-mais1" id="button-mais1">+</button>
        <br><br>
        <button class="button-0" id="button-0">0</button>
        <button class="button-ponto1" id="button-ponto1">.</button>
        <button class="button-mod" id="button-mod">mod</button>
        <button class="button-igual1" id="button-igual1">=</button>
    </div>
</body>
</html>
